name: Build OmniBaby APK

on:
  push:
    branches: [ main ]
    paths-ignore:
      - "**.md"
  workflow_dispatch:
    inputs:
      bump:
        description: "Type de version a incrementer"
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Calcul de la version ──────────────────────────────────
      - name: Compute version
        id: ver
        run: |
          if [ -f version.properties ]; then
            MAJOR=$(grep -oP '(?<=VERSION_MAJOR=)\d+' version.properties || echo 1)
            MINOR=$(grep -oP '(?<=VERSION_MINOR=)\d+' version.properties || echo 0)
            PATCH=$(grep -oP '(?<=VERSION_PATCH=)\d+' version.properties || echo 0)
          else
            MAJOR=1; MINOR=0; PATCH=0
          fi
          BUMP="${{ github.event.inputs.bump }}"
          [ -z "$BUMP" ] && BUMP="patch"
          case "$BUMP" in
            major) MAJOR=$((MAJOR+1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR+1)); PATCH=0 ;;
            *)     PATCH=$((PATCH+1)) ;;
          esac
          VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "MAJOR=$MAJOR"     >> $GITHUB_OUTPUT
          echo "MINOR=$MINOR"     >> $GITHUB_OUTPUT
          echo "PATCH=$PATCH"     >> $GITHUB_OUTPUT
          echo "Version : v$VERSION"

      # ── 3. Mise a jour des fichiers de version ──────────────────
      - name: Update version files
        run: |
          printf 'VERSION_MAJOR=%s\nVERSION_MINOR=%s\nVERSION_PATCH=%s\n' \
            '${{ steps.ver.outputs.MAJOR }}' \
            '${{ steps.ver.outputs.MINOR }}' \
            '${{ steps.ver.outputs.PATCH }}' > version.properties

          mkdir -p src
          printf '// Genere automatiquement - ne pas modifier\nexport const APP_VERSION = "%s"\nexport const APP_NAME = "OmniBaby"\n' \
            '${{ steps.ver.outputs.VERSION }}' > src/version.js

          # Met aussi a jour package.json (utilise par cap init)
          npm version ${{ steps.ver.outputs.VERSION }} --no-git-tag-version --allow-same-version

      # ── 4. Node.js ───────────────────────────────────────────────
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # ── 5. Java 17 ───────────────────────────────────────────────
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      # ── 6. Android SDK ───────────────────────────────────────────
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # ── 7. Dependances ───────────────────────────────────────────
      - name: Install dependencies
        run: npm install

      # ── 8. Build React ───────────────────────────────────────────
      - name: Build web app
        run: npm run build

      - name: Verify build
        run: test -f dist/index.html || (echo "Build Vite echoue" && exit 1)

      # ── 9. Capacitor — init + android + sync ─────────────────────
      - name: Capacitor init
        run: |
          npx cap init "OmniBaby" "com.omnibaby.app" \
            --web-dir dist \
            2>&1 || true

      - name: Capacitor add android
        run: |
          npx cap add android 2>&1 || true

      - name: Capacitor sync
        run: npx cap sync android

      # ── 9b. Fix Maven Central 403 via Gradle init script ─────────
      - name: Fix Maven repositories
        run: |
          mkdir -p ~/.gradle/init.d
          cat > ~/.gradle/init.d/maven-mirror.init.gradle << 'GRADLE'
          allprojects {
            buildscript {
              repositories {
                maven { url = uri("https://repo1.maven.org/maven2/") }
                maven { url = uri("https://dl.google.com/dl/android/maven2/") }
                gradlePluginPortal()
              }
            }
            repositories {
              maven { url = uri("https://repo1.maven.org/maven2/") }
              maven { url = uri("https://dl.google.com/dl/android/maven2/") }
            }
          }
          GRADLE

      # ── 9c. Injection des icones ──────────────────────────────────
      - name: Inject app icons
        run: |
          SRC="assets/android-icons"
          DEST="android/app/src/main/res"

          if [ ! -d "$SRC" ]; then
            echo "Pas de dossier $SRC, on garde les icones par defaut Capacitor."
            exit 0
          fi

          echo "=== Avant injection ==="
          find "$DEST" -name "ic_launcher*" | sort

          find "$DEST" -type d -name "mipmap-anydpi*" -exec rm -rf {} + 2>/dev/null || true
          find "$DEST" -name "ic_launcher*.xml" -delete 2>/dev/null || true

          for dir in mipmap-mdpi mipmap-hdpi mipmap-xhdpi mipmap-xxhdpi mipmap-xxxhdpi; do
            mkdir -p "$DEST/$dir"
            rm -f "$DEST/$dir/ic_launcher*.webp"
            rm -f "$DEST/$dir/ic_launcher*.png"
            cp "$SRC/$dir/ic_launcher.png"       "$DEST/$dir/ic_launcher.png"
            cp "$SRC/$dir/ic_launcher_round.png" "$DEST/$dir/ic_launcher_round.png"
            echo "OK $dir"
          done

          echo "=== Apres injection ==="
          find "$DEST" -name "ic_launcher*" | sort

      # ── 10. Keystore ──────────────────────────────────────────────
      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > $RUNNER_TEMP/omnibaby.keystore

      # ── 11. Permissions Gradle ───────────────────────────────────
      - name: Make gradlew executable
        run: chmod +x android/gradlew

      # ── 12. Build APK release signe ──────────────────────────────
      - name: Build release APK
        working-directory: android
        env:
          KEYSTORE_PATH: ${{ runner.temp }}/omnibaby.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease --no-daemon \
            -Pandroid.injected.signing.store.file=$KEYSTORE_PATH \
            -Pandroid.injected.signing.store.password=$KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASSWORD

      # ── 13. Renommer l'APK ────────────────────────────────────────
      - name: Rename APK
        id: apk
        run: |
          V="${{ steps.ver.outputs.VERSION }}"
          mkdir -p output
          cp android/app/build/outputs/apk/release/app-release.apk \
             "output/OmniBaby-v${V}.apk"
          echo "APK_NAME=OmniBaby-v${V}.apk" >> $GITHUB_OUTPUT

      # ── 14. ZIP des sources web ───────────────────────────────────
      - name: Create web ZIP
        id: zip
        run: |
          V="${{ steps.ver.outputs.VERSION }}"
          ZIP="output/OmniBaby-web-v${V}.zip"
          zip -r "$ZIP" dist/ src/ index.html package.json vite.config.js version.properties
          echo "ZIP_NAME=OmniBaby-web-v${V}.zip" >> $GITHUB_OUTPUT

      # ── 15. Commit du bump de version ─────────────────────────────
      - name: Commit version bump
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version.properties src/version.js package.json
          git diff --cached --quiet || \
            git commit -m "chore: release v${{ steps.ver.outputs.VERSION }} [skip ci]"
          git push

      # ── 16. Tag Git ────────────────────────────────────────────────
      - name: Tag release
        run: |
          V="${{ steps.ver.outputs.VERSION }}"
          git tag -a "v${V}" -m "OmniBaby v${V}"
          git push origin "v${V}"

      # ── 17. Upload artifact (sauvegarde build) ────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: OmniBaby
          path: output/*
          retention-days: 30

      # ── 18. GitHub Release ─────────────────────────────────────────
      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.ver.outputs.VERSION }}"
          name: "OmniBaby v${{ steps.ver.outputs.VERSION }}"
          body: |
            ## OmniBaby v${{ steps.ver.outputs.VERSION }}

            ### Installer sur Android
            1. Telecharge **${{ steps.apk.outputs.APK_NAME }}** ci-dessous
            2. Ouvre le fichier APK sur ton telephone
            3. Si demande : autorise les sources inconnues
            4. Installe — tes donnees sont conservees automatiquement

            | Fichier | Description |
            |---------|-------------|
            | `${{ steps.apk.outputs.APK_NAME }}` | Application Android |
            | `${{ steps.zip.outputs.ZIP_NAME }}` | Sources web |
          files: |
            output/${{ steps.apk.outputs.APK_NAME }}
            output/${{ steps.zip.outputs.ZIP_NAME }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
