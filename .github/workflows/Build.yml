name: Build OmniBaby APK

on:
  push:
    branches: [ main ]
    paths-ignore:
      - "**.md"
  workflow_dispatch:
    inputs:
      bump:
        description: "Type de version a incrementer"
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  build:
    name: Build & Sign APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:

      # ── 1. CHECKOUT ────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. VERSION ────────────────────────────────────────────────────────
      - name: Compute version
        id: ver
        run: |
          if [ -f version.properties ]; then
            MAJOR=$(grep -oP '(?<=VERSION_MAJOR=)\d+' version.properties || echo 1)
            MINOR=$(grep -oP '(?<=VERSION_MINOR=)\d+' version.properties || echo 0)
            PATCH=$(grep -oP '(?<=VERSION_PATCH=)\d+' version.properties || echo 0)
          else
            MAJOR=1; MINOR=0; PATCH=0
          fi
          BUMP="${{ github.event.inputs.bump }}"
          [ -z "$BUMP" ] && BUMP="patch"
          case "$BUMP" in
            major) MAJOR=$((MAJOR+1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR+1)); PATCH=0 ;;
            *)     PATCH=$((PATCH+1)) ;;
          esac
          VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "MAJOR=$MAJOR"     >> $GITHUB_OUTPUT
          echo "MINOR=$MINOR"     >> $GITHUB_OUTPUT
          echo "PATCH=$PATCH"     >> $GITHUB_OUTPUT
          echo "Version : v$VERSION"

      # ── 3. MISE À JOUR DES FICHIERS DE VERSION ────────────────────────────
      - name: Update version files
        run: |
          printf 'VERSION_MAJOR=%s\nVERSION_MINOR=%s\nVERSION_PATCH=%s\n' \
            '${{ steps.ver.outputs.MAJOR }}' \
            '${{ steps.ver.outputs.MINOR }}' \
            '${{ steps.ver.outputs.PATCH }}' > version.properties

          mkdir -p src
          printf "// Genere automatiquement — ne pas modifier\nexport const APP_VERSION = \"%s\"\nexport const APP_NAME = \"OmniBaby\"\n" \
            '${{ steps.ver.outputs.VERSION }}' > src/version.js

      # ── 4. BUILD REACT / VITE ─────────────────────────────────────────────
      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Verify build
        run: test -f dist/index.html || (echo "Build Vite echoue" && exit 1)

      # ── 5. JAVA 17 ────────────────────────────────────────────────────────
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # ── 6. ANDROID SDK ────────────────────────────────────────────────────
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # ── 7. KEYSTORE ────────────────────────────────────────────────────────
      # Si KEYSTORE_BASE64 absent => génération auto + sauvegarde dans Secrets
      - name: Install pynacl (pour chiffrer les secrets)
        run: pip install pynacl -q

      - name: Setup keystore
        id: ks
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO:     ${{ github.repository }}
          KEYSTORE_BASE64_VAL: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          mkdir -p android/keystore
          KS="android/keystore/release.keystore"
          PASS="OmniBaby2024!"
          ALIAS="omnibaby"

          if [ -n "$KEYSTORE_BASE64_VAL" ]; then
            echo "Keystore trouve dans les secrets."
            echo "$KEYSTORE_BASE64_VAL" | base64 --decode > "$KS"
            # Utiliser les secrets existants si définis
            [ -n "${{ secrets.KEYSTORE_PASSWORD }}" ] && PASS="${{ secrets.KEYSTORE_PASSWORD }}"
            [ -n "${{ secrets.KEY_ALIAS }}"         ] && ALIAS="${{ secrets.KEY_ALIAS }}"
          else
            echo "Premier build : generation du keystore..."
            keytool -genkey -v \
              -keystore "$KS" \
              -alias "$ALIAS" \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass "$PASS" -keypass "$PASS" \
              -dname "CN=OmniBaby,OU=Family,O=OmniBaby,L=Paris,ST=IDF,C=FR" \
              -noprompt
            echo "Keystore genere."

            B64=$(base64 -w 0 "$KS")

            echo "Sauvegarde des secrets dans GitHub via API..."
            python3 .github/scripts/save_secrets.py \
              "$GH_TOKEN" "$REPO" "$B64" "$PASS" "$ALIAS"

            echo "================================================================"
            echo "  Keystore genere et secrets sauvegardes automatiquement !"
            echo "  Mot de passe : $PASS  |  Alias : $ALIAS"
            echo "================================================================"
          fi

          echo "KS_PASS=$PASS"   >> $GITHUB_OUTPUT
          echo "KS_ALIAS=$ALIAS" >> $GITHUB_OUTPUT
          ls -lh "$KS"

      # ── 8. GRADLE ─────────────────────────────────────────────────────────
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.4"

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      # ── 9. BUILD APK ──────────────────────────────────────────────────────
      - name: Build release APK
        working-directory: android
        env:
          KEYSTORE_PASSWORD: ${{ steps.ks.outputs.KS_PASS }}
          KEY_ALIAS:         ${{ steps.ks.outputs.KS_ALIAS }}
          KEY_PASSWORD:      ${{ steps.ks.outputs.KS_PASS }}
        run: |
          ./gradlew assembleRelease \
            --no-daemon --stacktrace \
            -Pandroid.injected.signing.store.file="$(pwd)/keystore/release.keystore" \
            -Pandroid.injected.signing.store.password="$KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASSWORD"

      # ── 10. RENOMMER L'APK ────────────────────────────────────────────────
      - name: Rename APK
        id: apk
        run: |
          V="${{ steps.ver.outputs.VERSION }}"
          SRC="android/app/build/outputs/apk/release/app-release.apk"
          DST="OmniBaby-v${V}.apk"
          test -f "$SRC" || (echo "APK absent !" && exit 1)
          cp "$SRC" "$DST"
          echo "APK_NAME=$DST" >> $GITHUB_OUTPUT
          echo "APK : $DST"

      # ── 11. ZIP WEB ───────────────────────────────────────────────────────
      - name: Create web ZIP
        id: zip
        run: |
          V="${{ steps.ver.outputs.VERSION }}"
          ZIP="OmniBaby-web-v${V}.zip"
          zip -r "$ZIP" dist/ src/ index.html package.json vite.config.js version.properties
          echo "ZIP_NAME=$ZIP" >> $GITHUB_OUTPUT

      # ── 12. COMMIT VERSION ────────────────────────────────────────────────
      - name: Commit version bump
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version.properties src/version.js
          git diff --cached --quiet || \
            git commit -m "chore: release v${{ steps.ver.outputs.VERSION }} [skip ci]"
          git push

      # ── 13. TAG GIT ───────────────────────────────────────────────────────
      - name: Tag release
        run: |
          V="${{ steps.ver.outputs.VERSION }}"
          git tag -a "v${V}" -m "OmniBaby v${V}"
          git push origin "v${V}"

      # ── 14. GITHUB RELEASE ────────────────────────────────────────────────
      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.ver.outputs.VERSION }}"
          name: "OmniBaby v${{ steps.ver.outputs.VERSION }}"
          body: |
            ## OmniBaby v${{ steps.ver.outputs.VERSION }}

            ### Installer sur Android
            1. Telecharge **${{ steps.apk.outputs.APK_NAME }}** ci-dessous
            2. Ouvre le fichier APK sur ton telephone
            3. Si demande : autorise les sources inconnues
            4. Installe — tes donnees sont conservees automatiquement

            > Mise a jour sans desinstaller grace au keystore signe.

            | Fichier | Description |
            |---------|-------------|
            | `${{ steps.apk.outputs.APK_NAME }}` | Application Android |
            | `${{ steps.zip.outputs.ZIP_NAME }}` | Sources web |
          files: |
            ${{ steps.apk.outputs.APK_NAME }}
            ${{ steps.zip.outputs.ZIP_NAME }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
