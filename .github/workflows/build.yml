name: Build OmniBaby APK

on:
  push:
    branches: [ main ]
    paths-ignore:
      - "**.md"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Lecture de la version (definie manuellement dans version.properties) ──
      - name: Read version
        id: ver
        run: |
          MAJOR=$(grep -oP '(?<=VERSION_MAJOR=)\d+' version.properties || echo 1)
          MINOR=$(grep -oP '(?<=VERSION_MINOR=)\d+' version.properties || echo 0)
          PATCH=$(grep -oP '(?<=VERSION_PATCH=)\d+' version.properties || echo 0)
          VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Version utilisee : v$VERSION"

      # ── 3. Generation de src/version.js a partir de version.properties (build only) ──
      - name: Generate version.js
        run: |
          mkdir -p src
          printf '// Genere automatiquement depuis version.properties - ne pas modifier directement\nexport const APP_VERSION = "%s"\nexport const APP_NAME = "OmniBaby"\n' \
            '${{ steps.ver.outputs.VERSION }}' > src/version.js

          # Met aussi a jour package.json (utilise par cap init)
          npm version ${{ steps.ver.outputs.VERSION }} --no-git-tag-version --allow-same-version

      # ── 4. Node.js ───────────────────────────────────────────────
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # ── 5. Java 17 ───────────────────────────────────────────────
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      # ── 6. Android SDK ───────────────────────────────────────────
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # ── 7. Dependances ───────────────────────────────────────────
      - name: Clean previous node_modules
        run: rm -rf node_modules package-lock.json

      - name: Install dependencies
        run: npm install

      # ── 8. Build React ───────────────────────────────────────────
      - name: Build web app
        run: npm run build

      - name: Verify build
        run: test -f dist/index.html || (echo "Build Vite echoue" && exit 1)

      # ── 9. Capacitor — init + android + sync ─────────────────────
      - name: Capacitor init
        run: |
          npx cap init "OmniBaby" "com.omnibaby.app" \
            --web-dir dist \
            2>&1 || true

      - name: Capacitor add android
        run: |
          npx cap add android 2>&1 || true

      - name: Capacitor sync
        run: npx cap sync android

      # ── 9b. Fix Maven Central 403 via Gradle init script ─────────
      - name: Fix Maven repositories
        run: |
          mkdir -p ~/.gradle/init.d
          cat > ~/.gradle/init.d/maven-mirror.init.gradle << 'GRADLE'
          allprojects {
            buildscript {
              repositories {
                maven { url = uri("https://repo1.maven.org/maven2/") }
                maven { url = uri("https://dl.google.com/dl/android/maven2/") }
                gradlePluginPortal()
              }
            }
            repositories {
              maven { url = uri("https://repo1.maven.org/maven2/") }
              maven { url = uri("https://dl.google.com/dl/android/maven2/") }
            }
          }
          GRADLE

      # ── 9c. Injection des icones ──────────────────────────────────
      - name: Inject app icons
        run: |
          SRC="assets/android-icons"
          DEST="android/app/src/main/res"

          if [ ! -d "$SRC" ]; then
            echo "Pas de dossier $SRC, on garde les icones par defaut Capacitor."
            exit 0
          fi

          echo "=== Avant injection ==="
          find "$DEST" -name "ic_launcher*" | sort

          find "$DEST" -type d -name "mipmap-anydpi*" -exec rm -rf {} + 2>/dev/null || true
          find "$DEST" -name "ic_launcher*.xml" -delete 2>/dev/null || true

          for dir in mipmap-mdpi mipmap-hdpi mipmap-xhdpi mipmap-xxhdpi mipmap-xxxhdpi; do
            mkdir -p "$DEST/$dir"
            rm -f "$DEST/$dir/ic_launcher*.webp"
            rm -f "$DEST/$dir/ic_launcher*.png"
            cp "$SRC/$dir/ic_launcher.png"       "$DEST/$dir/ic_launcher.png"
            cp "$SRC/$dir/ic_launcher_round.png" "$DEST/$dir/ic_launcher_round.png"
            echo "OK $dir"
          done

          echo "=== Apres injection ==="
          find "$DEST" -name "ic_launcher*" | sort

      # ── 10. Keystore ──────────────────────────────────────────────
      # Le keystore est deja commite dans le repo (android-keystore/release.keystore)
      # car le dossier android/ est regenere a chaque fois par Capacitor.
      # On le copie simplement vers l'emplacement attendu pour la signature.
      - name: Restore keystore from repo
        run: |
          mkdir -p $RUNNER_TEMP
          if [ -f "android-keystore/release.keystore" ]; then
            cp android-keystore/release.keystore $RUNNER_TEMP/omnibaby.keystore
            echo "Keystore restaure depuis le repo."
          elif [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > $RUNNER_TEMP/omnibaby.keystore
            echo "Keystore restaure depuis les secrets."
          else
            echo "Aucun keystore trouve : generation d'un nouveau (PREMIER BUILD)."
            mkdir -p android-keystore
            keytool -genkey -v \
              -keystore android-keystore/release.keystore \
              -alias omnibaby \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass "OmniBaby2024!" -keypass "OmniBaby2024!" \
              -dname "CN=OmniBaby,OU=Family,O=OmniBaby,L=Paris,ST=IDF,C=FR" \
              -noprompt
            cp android-keystore/release.keystore $RUNNER_TEMP/omnibaby.keystore
            echo "NEW_KEYSTORE=true" >> $GITHUB_ENV
          fi

      # ── 11. Permissions Gradle ───────────────────────────────────
      - name: Make gradlew executable
        run: chmod +x android/gradlew

      # ── 12. Build APK release signe ──────────────────────────────
      - name: Build release APK
        working-directory: android
        env:
          KEYSTORE_PATH: ${{ runner.temp }}/omnibaby.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD || 'OmniBaby2024!' }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS || 'omnibaby' }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD || 'OmniBaby2024!' }}
        run: |
          ./gradlew assembleRelease --no-daemon \
            -Pandroid.injected.signing.store.file=$KEYSTORE_PATH \
            -Pandroid.injected.signing.store.password=$KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASSWORD

      # ── 13. Renommer l'APK ────────────────────────────────────────
      - name: Rename APK
        id: apk
        run: |
          V="${{ steps.ver.outputs.VERSION }}"
          mkdir -p output
          cp android/app/build/outputs/apk/release/app-release.apk \
             "output/OmniBaby-v${V}.apk"
          echo "APK_NAME=OmniBaby-v${V}.apk" >> $GITHUB_OUTPUT

      # ── 17. Upload artifact (sauvegarde build) ────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: OmniBaby
          path: output/*
          retention-days: 30

      # ── 18. GitHub Release ─────────────────────────────────────────
      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.ver.outputs.VERSION }}"
          name: "OmniBaby v${{ steps.ver.outputs.VERSION }}"
          body: |
            ## OmniBaby v${{ steps.ver.outputs.VERSION }}

            ### Installer sur Android
            1. Telecharge **${{ steps.apk.outputs.APK_NAME }}** ci-dessous
            2. Ouvre le fichier APK sur ton telephone
            3. Si demande : autorise les sources inconnues
            4. Installe — tes donnees sont conservees automatiquement

            | Fichier | Description |
            |---------|-------------|
            | `${{ steps.apk.outputs.APK_NAME }}` | Application Android |
          files: |
            output/${{ steps.apk.outputs.APK_NAME }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
